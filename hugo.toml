baseURL = "https://jetechholdings.com/"
title = "JE Tech Holdings"
theme = "agency"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
copyright = "© 2026 JE Tech Holding Inc. All rights reserved"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  colorScheme = "slate"
  defaultAppearance = "light" # light, dark, or auto
  enableSearch = true
  
  # Homepage Configuration
  showProjectList = true # We will use this for "Services"
  projectsMax = 3

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "JE Tech Holdings"
    [languages.en.params]
      description = "Premier Security Consulting & Tech Holdings"
      # footer = "Securing Your Digital Future." 

  [languages.ko]
    languageName = "한국어"
    weight = 2
    title = "JE Tech Holdings"
    [languages.ko.params]
      description = "최고의 보안 컨설팅 및 기술 지주회사"
      # footer = "디지털 미래를 안전하게 지킵니다."

  [languages.ja]
    languageName = "日本語"
    weight = 3
    title = "JE Tech Holdings"
    [languages.ja.params]
      description = "最高のセキュリティコンサルティングとテクノロジー投資"
      # footer = "デジタル未来を安全に。"

# English Menu
[[languages.en.menu.main]]
  identifier = "services"
  name = "Services"
  url = "/services/"
  weight = 10
[[languages.en.menu.main]]
  identifier = "insight"
  name = "Insight"
  url = "/insights/"
  weight = 20
[[languages.en.menu.main]]
  identifier = "contact"
  name = "Contact"
  url = "/contact/"
  weight = 30

[[languages.en.menu.buttons]]
  name = "한국어"
  weight = 10
  [languages.en.menu.buttons.params]
    action = "locale"
    lang = "ko"

[[languages.en.menu.buttons]]
  name = "日本語"
  weight = 20
  [languages.en.menu.buttons.params]
    action = "locale"
    lang = "ja"

