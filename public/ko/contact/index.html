          <p class="text-xl xl:leading-loose font-medium text-center text-[#777777]">JE Tech Holdings에 문의하세요</p>
        
      </div>

      <div class="prose mx-auto max-w-3xl">
        <p>질문이 있거나 프로젝트에 대해 논의하고 싶으신가요? 아래 양식을 작성해 주시면 24시간 이내에 연락드리겠습니다.</p>
<div class="contact-form-container">
  <form id="contact-form" action="https://formspree.io/f/xqedkeja" method="POST">
    
    <div style="margin-bottom: 1rem;">
      <label for="email" style="display: block; font-weight: 500; margin-bottom: 0.25rem;">
        이메일 주소 <span style="color: #ef4444;">*</span>
      </label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        required 
        placeholder="your@email.com"
        style="width: 100%; padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem;"
      />
      <p id="email-error" style="color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem; display: none;">
        올바른 이메일 주소를 입력해 주세요.
      </p>
    </div>
    
    <div style="margin-bottom: 1rem;">
      <label for="subject" style="display: block; font-weight: 500; margin-bottom: 0.25rem;">
        제목 <span style="color: #ef4444;">*</span>
      </label>
      <input 
        type="text" 
        id="subject" 
        name="subject" 
        required 
        placeholder="무엇을 도와드릴까요?"
        style="width: 100%; padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem;"
      />
    </div>
    
    <div style="margin-bottom: 1rem;">
      <label for="message" style="display: block; font-weight: 500; margin-bottom: 0.25rem;">
        메시지 <span style="color: #ef4444;">*</span>
      </label>
      <textarea 
        id="message" 
        name="message" 
        rows="5" 
        required 
        placeholder="프로젝트나 문의 사항에 대해 알려주세요..."
        style="width: 100%; padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem; resize: vertical;"
      ></textarea>
    </div>
    
    <button 
      type="submit" 
      style="width: 100%; background-color: #7c3aed; color: white; padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: 500; border: none; cursor: pointer; font-size: 1rem;"
      onmouseover="this.style.backgroundColor='#6d28d9'" 
      onmouseout="this.style.backgroundColor='#7c3aed'"
    >
      메시지 보내기
    </button>
  </form>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  var email = document.getElementById('email').value;
  var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  var errorEl = document.getElementById('email-error');
  
  if (!emailRegex.test(email)) {
    e.preventDefault();
    errorEl.style.display = 'block';
    document.getElementById('email').focus();
    return false;
  }
  errorEl.style.display = 'none';
});

document.getElementById('email').addEventListener('input', function() {
  document.getElementById('email-error').style.display = 'none';
});
</script>
